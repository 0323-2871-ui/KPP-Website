<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Enroll Page</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:linear-gradient(135deg,#1e88e5,#42a5f5);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

/* CARD */

.container{
background:white;
width:90%;
max-width:500px;
padding:30px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
animation:fade 0.5s ease;
}

@keyframes fade{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

h2{
text-align:center;
color:#1565c0;
margin-bottom:20px;
}

/* INPUTS */

input, textarea, select{
width:100%;
padding:12px;
margin:8px 0;
border-radius:10px;
border:1px solid #ccc;
}

label{
font-weight:bold;
color:#333;
}

/* BUTTON */

button{
width:100%;
padding:14px;
margin-top:15px;
border:none;
border-radius:30px;
background:linear-gradient(to right,#1565c0,#42a5f5);
color:white;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.03);
}

.payment{
margin-top:10px;
}

</style>

</head>

<body>

<div class="container">

<h2>Enrollment Form</h2>

<label>Full Name</label>
<input type="text" id="name" placeholder="Enter your full name">

<label>Address</label>
<textarea id="address" placeholder="Enter your address"></textarea>

<label>Selected Package</label>
<input type="text" id="package" placeholder="e.g. Starter Pack">

<label>Payment Method</label>
<select id="payment">
<option value="GCash">GCash</option>
<option value="Bank Payment">Bank Payment</option>
</select>

<button onclick="submitForm()">Submit Enrollment</button>

</div>

<script>

function submitForm(){

let name = document.getElementById("name").value;
let address = document.getElementById("address").value;
let pack = document.getElementById("package").value;
let payment = document.getElementById("payment").value;

if(name==""||address==""||pack==""){
alert("Please complete all fields!");
return;
}

alert(
"Enrollment Successful!\n\n" +
"Name: " + name + "\n" +
"Package: " + pack + "\n" +
"Payment: " + payment
);

}

</script>

</body>
</html>
