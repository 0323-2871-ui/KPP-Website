<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Receipt</title>

<style>

/* ===== GLOBAL ===== */
body{
    font-family:Arial;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;

    background: linear-gradient(
        135deg,
        #0f2027,
        #203a43,
        #2c5364
    );
    position:relative;
}

/* ===== AURORA BACKGROUND ===== */
.aurora::before,
.aurora::after{
    content:"";
    position:fixed;
    width:500px;
    height:500px;
    border-radius:50%;
    filter:blur(140px);
    opacity:0.6;
    z-index:-1;
    animation:float 10s infinite ease-in-out;
}

.aurora::before{
    background:#42a5f5;
    top:-120px;
    left:-100px;
}

.aurora::after{
    background:#7e57c2;
    bottom:-120px;
    right:-100px;
    animation-delay:2s;
}

@keyframes float{
    0%{transform:translateY(0px) scale(1);}
    50%{transform:translateY(-40px) scale(1.15);}
    100%{transform:translateY(0px) scale(1);}
}

/* ===== RECEIPT CARD ===== */
.receipt{
    width:90%;
    max-width:420px;
    background:rgba(255,255,255,0.9);
    backdrop-filter:blur(15px);
    border-radius:25px;
    padding:30px;
    box-shadow:0 15px 35px rgba(0,0,0,0.3);
    animation:fadeIn 0.6s ease;
    text-align:center;
}

/* ANIMATION */
@keyframes fadeIn{
from{opacity:0; transform:translateY(20px);}
to{opacity:1; transform:translateY(0);}
}

/* TITLE */
.receipt h2{
    color:#1565c0;
    margin-bottom:20px;
}

/* DETAILS */
.info{
    text-align:left;
    margin-top:10px;
    background:#f5f5f5;
    padding:15px;
    border-radius:15px;
    line-height:1.6;
    font-size:15px;
}

/* LABELS */
.label{
    font-weight:bold;
    color:#1565c0;
}

/* BUTTONS */
.btn{
    margin-top:20px;
    width:100%;
    padding:14px;
    border:none;
    border-radius:30px;
    font-weight:bold;
    cursor:pointer;
    color:white;
    background:linear-gradient(to right,#1565c0,#42a5f5);
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.03);
}

/* BACK TO HOME BUTTON */
.home-btn{
    margin-top:10px;
    background:linear-gradient(to right,#43a047,#66bb6a);
}

/* SMALL TEXT */
.small{
    font-size:12px;
    color:#777;
    margin-top:10px;
}

</style>

</head>

<body>

<!-- BACKGROUND -->
<div class="aurora"></div>

<div class="receipt">

<h2>🧾 Payment Receipt</h2>

<div class="info" id="receiptBox">
Loading receipt...
</div>

<!-- BUTTONS -->
<button class="btn" onclick="window.print()">
Print Receipt 🖨️
</button>

<button class="btn home-btn" onclick="goHome()">
🏠 Back to Home
</button>

<div class="small">Thank you for your payment 💙</div>

</div>

<script>

/* GET DATA FROM URL */
const params = new URLSearchParams(window.location.search);

const name = params.get("name");
const address = params.get("address");
const method = params.get("method");
const packageName = params.get("package");

document.getElementById("receiptBox").innerHTML = `
<p><span class="label">Name:</span> ${name}</p>
<p><span class="label">Address:</span> ${address}</p>
<p><span class="label">Payment Method:</span> ${method}</p>
<p><span class="label">Package:</span> ${packageName}</p>
<p><span class="label">Status:</span> Paid ✅</p>
`;

/* BACK TO HOME */
function goHome(){
    window.location.href = "Home.html";
}

</script>

</body>
</html>
