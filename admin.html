<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard - Payments</title>

<style>
body{
    font-family:Arial;
    background:#e3f2fd;
    margin:0;
    padding:20px;
}

h1{
    text-align:center;
    color:#1565c0;
}

.table-container{
    max-width:1000px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 10px 20px rgba(0,0,0,0.1);
    overflow-x:auto;
}

table{
    width:100%;
    border-collapse:collapse;
}

th, td{
    padding:12px;
    border-bottom:1px solid #ddd;
    text-align:center;
    font-size:14px;
}

th{
    background:#1565c0;
    color:white;
}

.btn{
    margin-top:15px;
    padding:10px;
    border:none;
    border-radius:20px;
    background:#d32f2f;
    color:white;
    cursor:pointer;
}
</style>
</head>

<body>

<h1>📊 Admin Payment Dashboard</h1>

<div class="table-container">

<table>
<thead>
<tr>
<th>Name</th>
<th>Package</th>
<th>Method</th>
<th>Reference</th>
<th>Date</th>
</tr>
</thead>

<tbody id="paymentTable"></tbody>

</table>

<button class="btn" onclick="clearPayments()">Clear All Records</button>

</div>

<script>

function loadPayments(){
    let payments = JSON.parse(localStorage.getItem("payments")) || [];
    let table = document.getElementById("paymentTable");

    table.innerHTML = "";

    payments.forEach(p => {
        let row = `
        <tr>
            <td>${p.name}</td>
            <td>${p.package}</td>
            <td>${p.method}</td>
            <td>${p.reference}</td>
            <td>${p.date}</td>
        </tr>
        `;
        table.innerHTML += row;
    });
}

function clearPayments(){
    if(confirm("Are you sure you want to delete all records?")){
        localStorage.removeItem("payments");
        loadPayments();
    }
}

loadPayments();

</script>

</body>
</html>
